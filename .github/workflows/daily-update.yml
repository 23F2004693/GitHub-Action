name: Daily Auto Commit

on:
  schedule:
    - cron: '15 3 * * *'   # Runs daily at 03:15 UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: 23f2004693@ds.study.iitm.ac.in - Make Daily Commit
        run: |
          echo "Last updated on $(date)" > daily-log.txt
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f2004693@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
